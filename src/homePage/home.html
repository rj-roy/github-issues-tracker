<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>GitHub Issues Tracker</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' href='./home.css'>
    <script src='./home.js'></script>

    <!-- customeTags -->
    <link rel="stylesheet" href="../../resorces/my-custom-tags/custom-tags.css">
    <script src="../../resorces/my-custom-tags/custom-tags.js"></script>

    <!-- daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google-font-integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body class="bg-[#f8fafc]">
    <header
        class="max-w-7xl space-x-5 mx-auto bg-[#ffffff] flex itms-center justify-between px-4 shadow-sm py-4 rounded-sm">
        <figure class="flex gap-2 items-center justify-center">
            <img class="w-10 h-10" src="./assets/github-logo.png" alt="">
            <figcaption class="font-bold text-xl sm:text-2xl">GitHub Issues Tracker</figcaption>
        </figure>

        <right-sec class="!flex items-center gap-3">
            <label
                class="flex items-center border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                <svg class="h-[2em] px-2 py-1 opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input class="hidden sm:block w-full px-4 py-2 border-none" type="search" required
                    placeholder="Search" />
            </label>

            <button class="btn btn-primary border-none">+ New Issue</button>
        </right-sec>
    </header>

    <main class="mt-15 bg-[#f8fafc]">

        <section id="issus-btns" class="max-w-6xl mx-auto px-4 bg-[#ffffff] shadow-sm p-6 flex flex-wrap gap-3">
            <button id="all-btn" class="fbt active btn btn-outline btn-primary hover:bg-[#333383] w-30">All</button>
            <button id="open-btn" class="fbt btn btn-outline btn-primary hover:bg-[#333383] w-30">Open</button>
            <button id="closed-btn" class="fbt btn-outline btn btn-primary hover:bg-[#333383] w-30">Closed</button>
        </section>

        <section id="issues-desc"
            class="max-w-6xl mx-auto px-4 bg-[#ffffff] shadow-sm mt-5 rounded-sm space-y-3 flex justify-between flex-wrap gap-6 py-6 items-center">
            <figure class="flex gap-3 items-center justify-center">
                <img src="./assets/Aperture.png" alt="">
                <figcaption>
                    <h2 id="num-of-issues" class="font-bold text-xl"></h2>
                    <p class="sm:text-nowrap">Track and manage your project issues</p>
                </figcaption>
            </figure>

            <div class="flex gap-3">
                <div class="flex gap-1 justify-center items-center">
                    <img src="./assets/open.png" alt="">
                    <p>Open</p>
                </div>
                <div class="flex gap-1 justify-center items-center">
                    <img src="./assets/closed.png" alt="">
                    <p>Closed</p>
                </div>
            </div>
        </section>

        <section id="ss">
            <div id="issues"
                class="max-w-6xl mx-auto px-4 py-6 bg-[#ffffff] shadow-sm mt-5 rounded-sm grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            </div>
        </section>

        <div id="spinner-loader" class="flex bg-[#ffffff] justify-center mt-30 hidden">
            <span class="loading loading-dots loading-xl"></span>
        </div>

        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle"></dialog>
    </main>
</body>

</html>
