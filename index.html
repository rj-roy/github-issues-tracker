<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>GitHub Issues Tracker</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' href='./src/styles/style.css'>
    <script src='./src/pages/home.js'></script>
    <script src='./src/scripts/login.js' defer></script>

    <!-- daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google-font-integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <section id="login-section" class="bg-gray-200 min-h-screen px-4 flex items-center justify-center">
        <div class="bg-white shadow-lg rounded-xl w-full max-w-md p-8">
            <div class="flex justify-center mb-4">
                <div class="bg-gray-800 text-white w-20 h-20 rounded-full flex items-center justify-center text-4xl">
                    <i class="fa-brands fa-github"></i>
                </div>
            </div>

            <h1 class="text-2xl font-semibold text-center text-gray-800">
                GitHub Issues Tracker
            </h1>
            <p class="text-center text-gray-500 mb-6">
                Sign in to manage your issues
            </p>

            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Username</label>
                <input id="username" type="text" placeholder="Enter Username"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500" />
                <p class="text-sm text-purple-600 mt-1">Default: admin</p>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Password</label>
                <input id="password" type="password" placeholder="Enter Password"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500" />
                <p class="text-sm text-purple-600 mt-1">Default: admin123</p>
            </div>

            <button id="sign-in-btn"
                class="w-full py-3 rounded-lg text-white font-medium bg-gradient-to-r from-purple-600 to-indigo-600 hover:opacity-90 transition">
                Sign In
            </button>

            <div class="flex items-center my-6">
                <div class="flex-1 h-px bg-gray-300"></div>
                <span class="px-3 text-gray-500 text-sm">OR</span>
                <div class="flex-1 h-px bg-gray-300"></div>
            </div>

            <p class="text-center text-gray-500 mb-3">Demo Credentials:</p>

            <div class="bg-gray-100 rounded-lg p-4 text-center">
                <p class="font-medium">Username: <span class="font-normal">admin</span></p>
                <p class="font-medium">Password: <span class="font-normal">admin123</span></p>
            </div>
        </div>
    </section>
</body>

</html>
